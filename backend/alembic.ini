[alembic]
script_location = alembic
# Sample PostgreSQL URL — override user, password, host, port, and dbname as needed.
# env.py also reads DATABASE_URL from the environment at migration time.
sqlalchemy.url = postgresql+psycopg2://harness:harness@localhost:5432/harness_builder

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
