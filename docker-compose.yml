services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: harness_builder
      POSTGRES_USER: harness
      POSTGRES_PASSWORD: harness
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./pgsql:/docker-entrypoint-initdb.d

  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://harness:harness@host.docker.internal:5432/harness_builder
      BACKEND_CORS_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
      SESSION_SECRET: dev-session-secret
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
